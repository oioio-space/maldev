name: mdbook

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "book.toml"
      - "theme/**"
      - ".github/workflows/mdbook.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: "0.4.40"
      MDBOOK_MERMAID_VERSION: "0.14.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook + mdbook-mermaid
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          curl -fsSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-v${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Strip front-matter, rewrite links, rename README.md → index.md
        # 1. mdBook renders YAML front-matter as visible "---" text — strip.
        # 2. ../README.md (and deeper variants) land outside the gh-pages
        #    root once deployed; rewrite to the absolute repo URL.
        # 3. Rewrite intra-doc `(path/README.md)` references to `(path/index.md)`
        #    — mdBook only swaps `.md` → `.html`, so without this step those
        #    end up as broken `path/README.html` URLs (mdBook actually emits
        #    `path/index.html` for area pages).
        # 4. Rename the area README.md files themselves to index.md so the
        #    SUMMARY entries (which we also rewrite) resolve to a real chapter
        #    body. Without the rename mdBook treats them as empty draft
        #    chapters and the area page renders blank.
        # The repo-root rewrite (step 2) MUST run before the README → index
        # link rewrite (step 3) to avoid double-touching it.
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            if head -1 "$f" | grep -q '^---$'; then
              awk 'BEGIN{seen=0} /^---$/ {seen++; if (seen<=2) next} seen>=2 {print}' "$f" > "$f.tmp"
              mv "$f.tmp" "$f"
            fi
            sed -i -E 's|\(\.\./(\.\./)*README\.md\)|(https://github.com/oioio-space/maldev)|g' "$f"
            sed -i -E 's|\(([^):]*)/README\.md\)|(\1/index.md)|g' "$f"
            sed -i -E 's|\(([^):]*)/README\.md#([^)]+)\)|(\1/index.md#\2)|g' "$f"
            sed -i -E 's|\(README\.md\)|(index.md)|g' "$f"
            sed -i -E 's|\(README\.md#([^)]+)\)|(index.md#\1)|g' "$f"
          done < <(find docs -name "*.md" -print0)
          # Now physically rename README.md → index.md so chapter resolution
          # finds a non-empty body. The repo's source still ships README.md;
          # the rename only affects the build copy in this CI job.
          while IFS= read -r -d '' f; do
            mv "$f" "$(dirname "$f")/index.md"
          done < <(find docs -name 'README.md' -print0)

      - name: Install mdbook-mermaid assets
        run: mdbook-mermaid install .

      - name: Build book
        run: mdbook build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
