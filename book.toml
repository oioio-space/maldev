[book]
title = "maldev"
description = "Authorized offensive security research library — modular Go techniques for malware development, EDR evasion, and red-team operations."
authors = ["oioio-space"]
language = "en"
multilingual = false
src = "docs"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/oioio-space/maldev"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/oioio-space/maldev/edit/master/{path}"
no-section-label = true
mathjax-support = true

[output.html.fold]
# `level = 0` (strict `>`): every chapter that has sub-items folds by
# default. Childless top-level entries (Getting Started, By Role,
# Reference) stay visible because mdBook's fold check requires
# `has_sub_items`. Net effect: under "Techniques", every area page
# (C2 / Cleanup / Evasion / …) shows collapsed; readers click to
# expand the per-technique list they actually need.
enable = true
level = 0

[output.html.search]
enable = true
limit-results = 30
heading-split-level = 3

[output.html.playground]
runnable = false

[preprocessor.mermaid]
command = "mdbook-mermaid"
